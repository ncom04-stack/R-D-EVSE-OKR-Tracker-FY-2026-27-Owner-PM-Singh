<!DOCTYPE html>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #07090f; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; font-size: 13px; min-height: 100vh; }
::-webkit-scrollbar { width: 4px; height: 4px; }

.header { background: #07090f; border-bottom: 1px solid rgba(255,255,255,.06); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; position: sticky; top: 0; z-index: 100; }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-icon { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg,#06b6d4,#6366f1); display: flex; align-items: center; justify-content: center; }

.header-actions { display: flex; align-items: center; gap: 12px; }

.unlock-btn { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); color: #cbd5e1; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.2s; }
.unlock-btn:hover { background: rgba(255,255,255,.1); color: #fff; }

.search-wrap { position: relative; flex: 1; max-width: 220px; }
.search-wrap input { width: 100%; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.07); border-radius: 10px; padding: 6px 10px 6px 30px; font-size: 11px; color: #cbd5e1; outline: none; }

.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: #475569; font-size: 13px; pointer-events: none; }

.tabs { background: #07090f; border-bottom: 1px solid rgba(255,255,255,.06); padding: 0 20px; display: flex; gap: 2px; }
.tab { padding: 9px 14px; font-size: 11px; font-weight: 600; color: #64748b; cursor: pointer; border: none; background: none; position: relative; transition: color .15s; }

.tab.active { color: #fff; }

.toolbar { padding: 12px 20px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

.main { padding: 16px 20px; display: flex; flex-direction: column; gap: 16px; }

/* Metric cards */
.metric-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
.metric-card { background: #0d1320; border: 1px solid rgba(255,255,255,.06); border-radius: 14px; padding: 16px; position: relative; overflow: hidden; cursor: default; }
.metric-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2.5px; }
.mc-cyan::after { background: linear-gradient(90deg,#06b6d4,#3b82f6); }
.mc-violet::after { background: linear-gradient(90deg,#8b5cf6,#ec4899); }
.mc-green::after { background: linear-gradient(90deg,#22c55e,#10b981); }
.mc-amber::after { background: linear-gradient(90deg,#f59e0b,#ef4444); }
.metric-label { font-size: 9px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #64748b; margin-bottom: 10px; }

.mc-green .metric-value { color: #4ade80; }

.metric-sub { font-size: 10px; color: #475569; margin-top: 6px; }

/* Middle row */
.mid-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.panel { background: #0d1320; border: 1px solid rgba(255,255,255,.06); border-radius: 14px; padding: 16px; }
.panel-title { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 2px; }
.panel-sub { font-size: 10px; color: #475569; margin-bottom: 14px; }

/* Donut */
.donut-wrap { display: flex; align-items: center; gap: 16px; }
.donut-svg-wrap { position: relative; width: 110px; height: 110px; flex-shrink: 0; }
.donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.donut-total { font-size: 20px; font-weight: 900; color: #fff; }
.donut-label { font-size: 9px; color: #64748b; text-transform: uppercase; letter-spacing: .06em; }
.legend-row { display: flex; flex-direction: column; gap: 10px; flex: 1; }
.leg-item { display: flex; flex-direction: column; gap: 4px; }
.leg-top { display: flex; justify-content: space-between; align-items: center; }
.leg-name { font-size: 10px; color: #94a3b8; }
.leg-val { font-size: 11px; font-weight: 700; }
.leg-bar { height: 4px; border-radius: 4px; background: rgba(255,255,255,.06); overflow: hidden; }
.leg-fill { height: 100%; border-radius: 4px; transition: width .8s ease; }

/* Category bars */
.cat-row { display: flex; flex-direction: column; gap: 12px; }
.cat-item { display: flex; flex-direction: column; gap: 5px; }
.cat-top { display: flex; justify-content: space-between; align-items: center; }

.milestone-list { display: flex; flex-direction: column; gap: 6px; }
.milestone-item { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.05); border-radius: 10px; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; cursor: default; }

.td-date { color: #64748b; white-space: nowrap; font-size: 10px; }

select.edit-select { background: #1e293b; color: #fff; border: 1px solid rgba(255,255,255,.2); border-radius: 4px; padding: 2px 4px; font-size: 10px; outline: none; }

.tl-right { text-align: right; flex-shrink: 0; }
.tl-date { font-size: 10px; font-weight: 700; color: #fff; }

      if(window.render) window.render();
    } catch (error) {
      console.error("Error fetching data:", error);
    }
  }

  window.syncWithDatabase = async function() {
    if (!window.isEditingUnlocked) return;
    try {
      await set(dbRef, { krs: window.KRS });
      console.log("Database updated successfully!");
    } catch (error) {
      alert("Failed to save to database. Check console.");
      console.error(error);
    }
  };

  // Start the load
  loadInitialData();
</script>

<!-- UI LOGIC SCRIPT -->
<script>
const CAT_COLORS = { 'Product Delivery':'#22d3ee', 'Quality':'#a855f7', 'Production Efficiency':'#f59e0b', 'Process':'#22c55e' };
let currentTab = 'overview';
let chartInstance = null;

// Handle unlock logic
function toggleEditing() {
  if (window.isEditingUnlocked) {
    window.isEditingUnlocked = false;
    document.getElementById('unlockBtn').textContent = "🔒 Unlock Editing";
    document.getElementById('unlockBtn').classList.remove('unlocked');
    render();
    return;
  }
  
  const pwd = prompt("Enter password to enable editing:");
  if (pwd === "arsh@2026") {
    window.isEditingUnlocked = true;
    document.getElementById('unlockBtn').textContent = "🔓 Editing Enabled";
    document.getElementById('unlockBtn').classList.add('unlocked');
    alert("Editing unlocked! Changes to status will now auto-save.");
    render(); // Re-render UI to show edit dropdowns
  } else if (pwd !== null) {
    alert("Incorrect password.");
  }
}

// Data updating logic
window.updateActionStatus = function(krNo, actionId, newStatus) {
  if (!window.isEditingUnlocked) return;
  
  const kr = window.KRS.find(k => k.krNo === krNo);
  if (kr) {
    const action = kr.actions.find(a => a.id === actionId);
    if (action) {
      action.status = newStatus;
      
      // Auto-update parent KR status if all completed
      const allCompleted = kr.actions.every(a => a.status === 'Completed');
      if (allCompleted) kr.status = 'Completed';
      else kr.status = 'In-Progress';
      
      window.syncWithDatabase();
      render();
      
      // If modal is open, re-render the modal content specifically
      if (document.getElementById('modalPanel').style.display === 'flex') {
        openModal(krNo);
      }
    }
  }
};

function getAllActions(){ return window.KRS.flatMap(kr=>kr.actions.map(a=>({...a,krNo:kr.krNo,krTitle:kr.title,category:kr.category}))); }
function getKrPct(kr){ const total=kr.actions.reduce((s,a)=>s+a.weight,0); const done=kr.actions.filter(a=>a.status==='Completed').reduce((s,a)=>s+a.weight,0); return total?Math.round((done/total)*100):0; }
function getStatusCounts(){ const all=getAllActions(); return{completed:all.filter(a=>a.status==='Completed').length,inProgress:all.filter(a=>a.status==='In-Progress').length,toBeStarted:all.filter(a=>a.status==='To be Started').length,total:all.length}; }
function daysLeft(d){ const today=new Date('2026-05-12'); return Math.ceil((new Date(d)-today)/86400000); }

function statusBadge(s){
  if(s==='Completed') return '<span class="status-badge sb-completed">Completed</span>';
  if(s==='In-Progress') return '<span class="status-badge sb-inprogress">In-Progress</span>';
  return '<span class="status-badge sb-tobestarted">To be Started</span>';
}

// Renders either a static badge or an editable dropdown
function editableStatusBadge(krNo, actionId, currentStatus) {
  if (!window.isEditingUnlocked) return statusBadge(currentStatus);
  return `
    <select class="edit-select" onchange="updateActionStatus('${krNo}', '${actionId}', this.value)">
      <option value="To be Started" ${currentStatus==='To be Started'?'selected':''}>To be Started</option>
      <option value="In-Progress" ${currentStatus==='In-Progress'?'selected':''}>In-Progress</option>
      <option value="Completed" ${currentStatus==='Completed'?'selected':''}>Completed</option>
    </select>
  `;
}

function statusIcon(s){
  if(s==='Completed') return '<span class="action-icon ai-completed">✓</span>';
  if(s==='In-Progress') return '<span class="action-icon ai-inprogress">◑</span>';
  return '<span class="action-icon ai-tobestarted">○</span>';
}
function statusColor(s){ if(s==='Completed') return '#4ade80'; if(s==='In-Progress') return '#fbbf24'; return '#818cf8'; }
function daysColor(d){ if(d<=14) return 'ms-urgent'; if(d<=30) return 'ms-warn'; return 'ms-ok'; }

function getFilters(){ return{cat:document.getElementById('catFilter').value,status:document.getElementById('statusFilter').value,search:document.getElementById('searchInput').value.toLowerCase()}; }
function filterKRs(){
  const{cat,status,search}=getFilters();
  return window.KRS.filter(kr=>{
    const mc=cat==='All'||kr.category===cat;
    const ms=status==='All'||kr.status===status;
    const mq=!search||kr.title.toLowerCase().includes(search)||kr.krNo.toLowerCase().includes(search);
    return mc&&ms&&mq;
  });
}
function filterActions(){
  const{cat,status,search}=getFilters();
  return getAllActions().filter(a=>{
    const mc=cat==='All'||a.category===cat;
    const ms=status==='All'||a.status===status;
    const mq=!search||a.title.toLowerCase().includes(search)||a.krNo.toLowerCase().includes(search);
    return mc&&ms&&mq;
  });
}

function krCard(kr,wide){
  const pct=getKrPct(kr);
  const c=CAT_COLORS[kr.category]||'#94a3b8';
  const done=kr.actions.filter(a=>a.status==='Completed').length;
  return `<button class="kr-card" onclick="openModal('${kr.krNo}')">
    <div class="kr-card-top">
      <span class="kr-no" style="color:${c}">${kr.krNo}</span>
      ${statusBadge(kr.status)}
    </div>
    <div class="kr-title">${kr.title}</div>
    <div class="kr-pct">${pct}%</div>
    <div class="kr-done">${done}/${kr.actions.length} done</div>
    <div class="kr-prog-bg"><div class="kr-prog-fill" style="width:${pct}%;background:${c}"></div></div>
  </button>`;
}

function renderOverview(){
  const sc=getStatusCounts();
  const today=new Date('2026-05-12');
  const milestones=window.KRS.filter(kr=>kr.dueDate&&new Date(kr.dueDate)>=today)
    .map(kr=>({...kr,dl:daysLeft(kr.dueDate)}))
    .sort((a,b)=>a.dl-b.dl).slice(0,5);

  const cats=[
    {name:'Product Delivery',color:'#22d3ee',weight:75,krs:5},
    {name:'Quality',color:'#a855f7',weight:10,krs:9},
    {name:'Production Efficiency',color:'#f59e0b',weight:10,krs:4},
    {name:'Process',color:'#22c55e',weight:5,krs:3},
  ];

  const pdKRs=window.KRS.filter(kr=>kr.category==='Product Delivery');

  return `
  <div class="metric-grid">
    <div class="metric-card mc-cyan">
      <div class="metric-label">Total Key Results</div>
      <div class="metric-value">${window.KRS.length}</div>
      <div class="metric-sub">Across 4 categories</div>
    </div>
    <div class="metric-card mc-violet">
      <div class="metric-label">Total Actions</div>
      <div class="metric-value">${sc.total}</div>
      <div class="metric-sub">Detailed tasks</div>
    </div>
    <div class="metric-card mc-green">
      <div class="metric-label">Actions Completed</div>
      <div class="metric-value">${sc.completed}</div>
      <div class="metric-sub">${sc.total ? Math.round(sc.completed/sc.total*100) : 0}% done</div>
    </div>
    <div class="metric-card mc-amber">
      <div class="metric-label">In-Progress Actions</div>
      <div class="metric-value">${sc.inProgress}</div>
      <div class="metric-sub">Currently active</div>
    </div>
  </div>

  <div class="mid-row">
    <div class="panel">
      <div class="panel-title">Action Status</div>
      <div class="panel-sub">Distribution across all activities</div>
      <div class="donut-wrap">
        <div class="donut-svg-wrap">
          <canvas id="donutChart" width="110" height="110"></canvas>
          <div class="donut-center"><div class="donut-total">${sc.total}</div><div class="donut-label">Actions</div></div>
        </div>
        <div class="legend-row">
          ${[['Completed',sc.completed,'#22c55e'],['In-Progress',sc.inProgress,'#f59e0b'],['To be Started',sc.toBeStarted,'#6366f1']].map(([n,v,c])=>`
          <div class="leg-item">
            <div class="leg-top">
              <span class="leg-name">${n}</span>
              <span class="leg-val" style="color:${c}">${v}</span>
            </div>
            <div class="leg-bar"><div class="leg-fill" style="width:${sc.total?Math.round(v/sc.total*100):0}%;background:${c}"></div></div>
          </div>`).join('')}
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">Upcoming Milestones</div>
      <div class="panel-sub">Next deadlines to watch</div>
      <div class="milestone-list">
        ${milestones.map(m=>`<div class="milestone-item">
          <div class="ms-left">
            <div class="ms-kr">${m.krNo}</div>
            <div class="ms-title">${m.title.slice(0,38)}${m.title.length>38?'…':''}</div>
            <div class="ms-date">${m.dueDate}</div>
          </div>
          <div class="ms-days ${daysColor(m.dl)}">${m.dl}d</div>
        </div>`).join('')}
      </div>
    </div>
  </div>

  <div>
    <div class="section-head">
      <div class="section-title">Product Delivery KR Progress</div>
      <div class="section-sub">Weighted completion estimate — click a card for action details</div>
    </div>
    <div class="kr-grid">
      ${pdKRs.map(kr=>krCard(kr,false)).join('')}
    </div>
  </div>`;
}

function renderKeyResults(){
  const krs=filterKRs();
  if(!krs.length) return '<div class="empty-state">No key results match the current filters.</div>';
  return `<div style="color:#475569;font-size:10px;margin-bottom:8px">${krs.length} key results shown</div>
  <div class="kr-all-grid">${krs.map(kr=>krCard(kr,true)).join('')}</div>`;
}

function renderActions(){
  const actions=filterActions();
  if(!actions.length) return '<div class="empty-state">No actions match the current filters.</div>';
  return `<div style="color:#475569;font-size:10px;margin-bottom:8px">${actions.length} actions shown</div>
  <div class="actions-table">
    <table>
      <thead><tr>
        <th>KR</th><th>Action</th><th>Category</th><th>Status</th><th>Due Date</th><th>Wt</th>
      </tr></thead>
      <tbody>
        ${actions.map(a=>`<tr>
          <td class="td-kr">${a.krNo}</td>
          <td class="td-title"><span>${a.id} — ${a.title}</span></td>
          <td class="td-cat">${a.category}</td>
          <td>${editableStatusBadge(a.krNo, a.id, a.status)}</td>
          <td class="td-date">${a.dueDate}</td>
          <td class="td-wt">${Math.round(a.weight*100)}%</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

function renderTimeline(){
  const months=['May','Jun','Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar'];
  const mDates=['2026-05','2026-06','2026-07','2026-08','2026-09','2026-10','2026-11','2026-12','2027-01','2027-02','2027-03'];
  const all=getAllActions();
  const data=months.map((m,i)=>({
    month:m,
    due:all.filter(a=>a.dueDate.startsWith(mDates[i])).length,
    completed:all.filter(a=>a.dueDate.startsWith(mDates[i])&&a.status==='Completed').length
  }));

  const sortedKRs=[...window.KRS].sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate));

  return `<div class="chart-panel">
    <div class="panel-title">Monthly Action Timeline</div>
    <div class="panel-sub" style="margin-bottom:14px">Actions due vs completed per month (FY 2026–27)</div>
    <div style="display:flex;gap:16px;margin-bottom:10px;font-size:11px;color:var(--color-text-secondary,#64748b)">
      <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:#6366f1;display:inline-block"></span>Actions Due</span>
      <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:#22c55e;display:inline-block"></span>Completed</span>
    </div>
    <div style="position:relative;width:100%;height:200px">
      <canvas id="timelineChart"></canvas>
    </div>
    <div id="tlData" style="display:none">${JSON.stringify(data)}</div>
  </div>
  <div class="timeline-cards">
    ${sortedKRs.map(kr=>`<div class="tl-card">
      <div class="tl-left">
        <div class="tl-kr">${kr.krNo}</div>
        <div class="tl-title">${kr.title}</div>
        <div class="tl-cat">${kr.category}</div>
      </div>
      <div class="tl-right">
        <div class="tl-date">${kr.dueDate}</div>
        <div class="tl-status" style="color:${statusColor(kr.status)}">${kr.status}</div>
      </div>
    </div>`).join('')}
  </div>`;
}

function drawDonut(sc){
  const canvas=document.getElementById('donutChart');
  if(!canvas||typeof Chart==='undefined') return;
  if(chartInstance) chartInstance.destroy();
  chartInstance=new Chart(canvas,{
    type:'doughnut',
    data:{
      labels:['Completed','In-Progress','To be Started'],
      datasets:[{data:[sc.completed,sc.inProgress,sc.toBeStarted],backgroundColor:['#22c55e','#f59e0b','#6366f1'],borderWidth:0,borderRadius:3,spacing:2}]
    },
    options:{responsive:false,cutout:'72%',plugins:{legend:{display:false}}}
  });
}

function drawTimeline(){
  const canvas=document.getElementById('timelineChart');
  const dataEl=document.getElementById('tlData');
  if(!canvas||!dataEl||typeof Chart==='undefined') return;
  if(chartInstance) chartInstance.destroy();
  const data=JSON.parse(dataEl.textContent);
  chartInstance=new Chart(canvas,{
    type:'bar',
    data:{
      labels:data.map(d=>d.month),
      datasets:[
        {label:'Actions Due',data:data.map(d=>d.due),backgroundColor:'#6366f1',borderRadius:4,borderSkipped:false},
        {label:'Completed',data:data.map(d=>d.completed),backgroundColor:'#22c55e',borderRadius:4,borderSkipped:false},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      scales:{
        x:{ticks:{color:'#475569',font:{size:10}},grid:{display:false},border:{display:false}},
        y:{ticks:{color:'#475569',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'},border:{display:false}}
      },
      plugins:{legend:{display:false}}
    }
  });
}

window.render = function(){
  const c=document.getElementById('mainContent');
  if(chartInstance){chartInstance.destroy();chartInstance=null;}
  if(currentTab==='overview') c.innerHTML=renderOverview();
  else if(currentTab==='keyresults') c.innerHTML=renderKeyResults();
  else if(currentTab==='actions') c.innerHTML=renderActions();
  else if(currentTab==='timeline') c.innerHTML=renderTimeline();

  if(currentTab==='overview') setTimeout(()=>drawDonut(getStatusCounts()),50);
  if(currentTab==='timeline') setTimeout(()=>drawTimeline(),50);
}

window.setTab = function(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
}

window.resetFilters = function(){
  document.getElementById('catFilter').value='All';
  document.getElementById('statusFilter').value='All';
  document.getElementById('searchInput').value='';
  render();
}

document.getElementById('catFilter').addEventListener('change',render);
document.getElementById('statusFilter').addEventListener('change',render);
document.getElementById('searchInput').addEventListener('input',render);

window.openModal = function(krNo){
  const kr=window.KRS.find(k=>k.krNo===krNo);
  if(!kr) return;
  const pct=getKrPct(kr);
  const c=CAT_COLORS[kr.category]||'#94a3b8';
  document.getElementById('mKrNo').textContent=`${kr.krNo} · ${kr.category}`;
  document.getElementById('mKrNo').style.color=c;
  document.getElementById('mKrTitle').textContent=kr.title;
  document.getElementById('mKrMeta').textContent=`Target: ${kr.target} · Due: ${kr.dueDate}`;
  document.getElementById('mKrPct').textContent=`${pct}%`;
  document.getElementById('mKrBar').style.cssText=`width:${pct}%;background:${c}`;
  document.getElementById('mKrActions').innerHTML=`
    <div class="modal-actions-label">Actions (${kr.actions.length})</div>
    ${kr.actions.map(a=>`<div class="action-row">
      ${window.isEditingUnlocked ? editableStatusBadge(kr.krNo, a.id, a.status) : statusIcon(a.status)}
      <div class="action-info" style="margin-left: 8px;">
        <div class="action-name">${a.id} — ${a.title}</div>
        <div class="action-meta">Due: ${a.dueDate} · Weight: ${Math.round(a.weight*100)}%</div>
      </div>
    </div>`).join('')}
  `;
  document.getElementById('modalBackdrop').style.display='block';
  document.getElementById('modalPanel').style.display='flex';
}

window.closeModal = function(){
  document.getElementById('modalBackdrop').style.display='none';
  document.getElementById('modalPanel').style.display='none';
}

// Initial render using local fallback array until DB fetches
render();
</script>
</body>
</html>
